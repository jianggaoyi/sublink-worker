name: Sync upstream

on:
  schedule:
    - cron: '0 18 * * *'  # 每天北京时间凌晨2点自动检查一次
  workflow_dispatch:        # 也支持手动点击触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream and merge
        run: |
          git remote add upstream https://github.com/7Sageer/sublink-worker.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories -X theirs
          git push origin main
