name: Sync upstream

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Add upstream and merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/7Sageer/sublink-worker.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories -X theirs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update lockfile
        run: |
          pnpm install --no-frozen-lockfile
          git add pnpm-lock.yaml
          git diff --cached --quiet || git commit -m "chore: update lockfile"

      - name: Push
        run: git push origin main
