name: Sync upstream

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Add upstream and merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/7Sageer/sublink-worker.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories -X theirs

      - name: Remove obsolete pnpm lockfile
        run: |
          if [ -f pnpm-lock.yaml ]; then
            git rm pnpm-lock.yaml
            git commit -m "chore: remove obsolete pnpm-lock.yaml, project now uses npm"
          fi

      - name: Push
        run: git push origin main
